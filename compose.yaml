name: lx2hub
services:
  postgres:
    image: postgres:17-alpine
    container_name: "${COMPOSE_PROJECT_NAME}-postgres"
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: "${COMPOSE_PROJECT_NAME}-redis"
    ports:
      - "6379:6379"

volumes:
  postgres_data: